<section>
  <div class="container product-detail" id="product-root">
    <!-- filled by JS -->
  </div>
</section>

<footer>
  NovaGear is a fictional store for ad-platform practice only. No real payments are processed.
</footer>

<script src="js/script.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id") || "1";
  const p = getProduct(id);
  const root = document.getElementById("product-root");

  if (p) {
    root.innerHTML = `
      <div class="product-thumb-lg" style="background:${p.color}">${p.emoji}</div>
      <div class="product-info">
        <p class="card-cat">${p.category}</p>
        <h1>${p.name}</h1>
        <p>${p.desc}</p>
        <p class="price-lg">${formatPrice(p.price)}</p>
        <button class="btn" onclick="addToCart('${p.id}'); window.location.href='cart.html';">Add to Cart</button>
      </div>
    `;
    viewItem(p.id); // fires "view_item" dataLayer event
    document.title = p.name + " – NovaGear";
  } else {
    root.innerHTML = "<p>Product not found. <a href='shop.html'>Back to shop</a></p>";
  }
</script>
